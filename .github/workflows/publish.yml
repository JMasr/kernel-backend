name: Build and publish Docker image

on:
  push:
    branches: [master]

jobs:
  # ── Unit tests run before building the image ────────────────────────────────
  # Scope: tests/unit only.
  # Needs ffmpeg (same system dep as the production container) for media tests.
  # Integration tests (marked slow/integration) require the full Docker stack
  # and run separately — not in this CI job.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit --ignore=tests/unit/test_verification_endpoint.py -x -v --tb=short

  # ── Build and push only if tests pass ───────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jmasr/kernel-backend:latest
            ghcr.io/jmasr/kernel-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trigger deploy in kernel-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token:      ${{ secrets.DEPLOY_PAT }}
          repository: JMasr/kernel-infra
          event-type: backend-image-pushed
