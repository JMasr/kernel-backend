      - id: "vibeace_01"
        path: "audio/music/vibeace_01.wav"
        sha256: "b865539ab507b9bc6bf6e7dfa21c782a73abfd5802ee1d2f21eca12258d7b388"
        duration_s: 61.46
        sample_rate: 44100
        source: "librosa:vibeace"
        conditions: ["ambient", "low_energy", "sustained"]

# ─── Video ───────────────────────────────────────────────────────────────────

video:

  speech:
    description: "Monologue and conference-style video with speech audio"
    blocking: true
    clips:
      - id: "speech_01"
        path: "video/speech/speech.mp4"
        sha256: "f5cf4f10a371643982795bb4fb5d6aaffe9db4af9e7100db46e273e47dedba0b"
        duration_s: 206.16
        fps: 25.0
        resolution: [960, 540]
        has_audio: true
        conditions: ["interview", "indoor", "speech", "h264", "aac"]

  outside:
    description: "Outdoor interviews — ambient noise, variable light, wind"
    blocking: true
    clips:
      - id: "camping_01"
        path: "video/outdoor/camping_01.mp4"
        sha256: "6a28f1b26e261249895a44bd98b66474dbfde0a7e9b167efab1856929105011f"
        duration_s: 1057.90
        fps: 30.0
        resolution: [1280, 720]
        has_audio: true
        conditions: ["outdoor", "ambient_noise", "natural_light", "h264", "aac"]

  without_audio:
    description: "Video-only streams — no audio track present"
    blocking: true
    clips:
      - id: "dark_no_audio_01"
        path: "video/without_audio/video_dark_no_audio.mp4"
        sha256: "52878cd0c1872f462693f8ac0f9cc47de3b817d3bd5c1016c67fab05e516f928"
        duration_s: 122.11
        fps: 30.0
        resolution: [1920, 1080]
        has_audio: true        # ffprobe detects an AAC track; name is misleading
        conditions: ["indoor", "dark", "h264", "aac_track_present"]

  others:
    description: "Mixed or uncategorized video content — informational"
    blocking: false
    clips:
      - id: "show_01"
        path: "video/others/show.mp4"
        sha256: "c14d8195d6bdd801f27cd783923c51db8f3cd4df602ba57773e5b236a09f2080"
        duration_s: 300.28
        fps: 29.97
        resolution: [1280, 720]
        has_audio: true
        conditions: ["mixed", "indoor", "show", "h264", "aac"]

# ─── Degradations ────────────────────────────────────────────────────────────

degradations:
  audio:
    babble:
      snr_db: [10, 20]
      seed: 42
    pink_noise:
      snr_db: [20, 30]
      seed: 42
    mp3_sim:
      bitrate_kbps: [32, 64]
    voip_sim:
      codec: "g711"
      bandwidth_hz: [300, 3400]

  video:
    h264_recompress:
      crf: [23, 28, 35]
    resize:
      targets: [[1280, 720], [854, 480]]
    trim_offset:
      offset_ms: [-100, 0, 100]

# ─── Thresholds ──────────────────────────────────────────────────────────────

thresholds:
  audio:
    speech:
      babble_10db:     { pass_rate: 0.80, max_hamming: 10 }
      pink_20db:       { pass_rate: 0.85, max_hamming: 10 }
      mp3_32k:         { pass_rate: 0.80, max_hamming: 10 }
      voip_sim:        { pass_rate: 0.70, max_hamming: 10 }
      discrimination:  { pass_rate: 0.80, min_hamming: 20 }
    music:
      babble_10db:     { pass_rate: 0.65, max_hamming: 10 }
      pink_20db:       { pass_rate: 0.70, max_hamming: 10 }
      discrimination:  { pass_rate: 0.70, min_hamming: 20 }

  video:
    speech:
      h264_crf23:      { pass_rate: 0.85, min_agreement: 0.55 }
      h264_crf28:      { pass_rate: 0.75, min_agreement: 0.52 }
      resize_720p:     { pass_rate: 0.80, min_agreement: 0.52 }
    outside:
      h264_crf23:      { pass_rate: 0.80, min_agreement: 0.52 }
      h264_crf28:      { pass_rate: 0.70, min_agreement: 0.50 }
      resize_720p:     { pass_rate: 0.75, min_agreement: 0.50 }
    without_audio:
      h264_crf23:      { pass_rate: 0.85, min_agreement: 0.55 }
      h264_crf28:      { pass_rate: 0.75, min_agreement: 0.52 }
