      - id: "trumpet_01"
        path: "audio/music/trumpet_01.wav"
        sha256: "5d27eacaab3b81c43839cdce491e2482b24370145643a7b46bf1b118174aeb53"
        duration_s: 5.33
        sample_rate: 44100
        source: "librosa:trumpet"
