        sha256: "b752b40eb1a0794f2593a3070a7a5950e5f2ae44bec3c9e4befdd89ea5045b4f"
        duration_s: 25.03
        sample_rate: 44100
        speaker: null
        language: "en"
        source: "librosa:choice"
