  music:
    description: "Music recordings — informational, non-blocking"
    blocking: false
    clips:
      - id: "brahms_piano_01"
        path: "audio/music/brahms_piano_01.wav"
        sha256: "d386a1091cdba24093c934f43195bf696f0ed0995b6ff76cbb78eb8aa9d56620"
