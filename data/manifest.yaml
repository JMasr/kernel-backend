        duration_s: 14.84
        sample_rate: 44100
        speaker: "M01"
        language: "en"
        source: "librosa:libri1"
        conditions: ["studio", "clean", "male"]

      - id: "libri_female_01"
        path: "audio/speech/libri_female_01.wav"
        sha256: "9e26635568b137552851110da2f711dfa34cd9452a004826e0ce0b7cbb07345f"
        duration_s: 16.74
        sample_rate: 44100
        speaker: "F01"
        language: "en"
        source: "librosa:libri2"
        conditions: ["studio", "clean", "female"]

      - id: "choice_hiphop_01"
